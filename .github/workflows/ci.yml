name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-checks:
    name: Backend and static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m compileall app tests

      - name: Run health test
        env:
          DATABASE_URL: postgresql+asyncpg://clonexa:clonexa@localhost:5432/clonexa
          JWT_SECRET_KEY: ci-test-secret
        run: python -m pytest tests/test_health.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check WhatsApp bridge syntax
        run: npm run check:whatsapp

      - name: Check static web syntax
        run: |
          node --check app/web/client.js
          node --check app/web/mini_panel.js